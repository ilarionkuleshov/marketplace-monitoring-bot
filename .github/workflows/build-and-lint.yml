name: Build and lint

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Build
      run: docker build -t marketplace-monitoring-bot .

    - name: Lint
      run: docker run marketplace-monitoring-bot poetry run bash ./scripts/lint.sh
